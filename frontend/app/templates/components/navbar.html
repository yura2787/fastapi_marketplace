<nav class="site-nav">
  <div class="container">
    <a class="nav-brand" href="{{ url_for('index') }}">Shop<span>Hub</span></a>

    <form class="nav-search" method="get" action="{{ url_for('index') }}">
      {% if request.query_params.get('category_id') %}
      <input type="hidden" name="category_id" value="{{ request.query_params.get('category_id') }}">
      {% endif %}
      <input name="q" type="search" placeholder="Пошук товарів..." value="{{ request.query_params.get('q', '') }}">
      <button class="btn btn-primary btn-sm px-3" type="submit">Знайти</button>
    </form>

    <div class="nav-actions">
      <a href="{{ url_for('cart_page') }}" class="btn-nav-cart">
        🛒
        {% if cart_count and cart_count > 0 %}
        <span class="cart-badge" id="cartBadge">{{ cart_count }}</span>
        {% else %}
        <span class="cart-badge" id="cartBadge" style="display:none">0</span>
        {% endif %}
      </a>

      {% if user %}
      <div class="dropdown">
        <button class="btn btn-light btn-sm dropdown-toggle fw-600" type="button" data-bs-toggle="dropdown">
          👤 {{ user.name }}
        </button>
        <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0">
          <li><span class="dropdown-item-text text-muted small">{{ user.email }}</span></li>
          <li><hr class="dropdown-divider my-1"></li>
          <li><a class="dropdown-item" href="{{ url_for('logout') }}">🚪 Вийти</a></li>
        </ul>
      </div>
      {% else %}
      <a href="{{ url_for('login') }}" class="btn btn-outline-primary btn-sm">Увійти</a>
      <a href="{{ url_for('register') }}" class="btn btn-primary btn-sm">Реєстрація</a>
      {% endif %}
    </div>
  </div>
</nav>
