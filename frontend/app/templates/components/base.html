<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}ShopHub{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', path='css/base.css') }}" rel="stylesheet">
  </head>
  <body>

  {% include "components/navbar.html" %}

  <div class="toast-container" id="toastContainer"></div>

  {% block content %}{% endblock %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function showToast(msg, type = 'success') {
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = 'toast-msg';
      t.style.background = type === 'error' ? '#dc2626' : '#1e293b';
      t.textContent = msg;
      c.appendChild(t);
      setTimeout(() => t.remove(), 3200);
    }

    async function addToCart(productId, btn) {
      const token = document.cookie.split('; ').find(r => r.startsWith('access_token='))?.split('=')[1];
      if (!token) { window.location.href = '/login'; return; }
      btn.disabled = true;
      try {
        const res = await fetch(`/cart/update`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: `product_id=${productId}&quantity=1`
        });
        if (res.ok) {
          showToast('Додано до кошика ✓');
          const badge = document.getElementById('cartBadge');
          if (badge) badge.textContent = parseInt(badge.textContent || 0) + 1;
        } else {
          showToast('Помилка', 'error');
        }
      } catch { showToast('Помилка', 'error'); }
      finally { btn.disabled = false; }
    }
  </script>
  {% block scripts %}{% endblock %}
  </body>
</html>
