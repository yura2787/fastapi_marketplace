{% extends "components/base.html" %}
{% block title %}Вхід — ShopHub{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">Shop<span style="color:#f59e0b">Hub</span></div>
    <div class="auth-subtitle">Увійдіть у свій акаунт</div>

    {% if errors %}
    <div class="alert alert-danger py-2 px-3 mb-3" style="border-radius:8px;font-size:.88rem">
      ⚠️ {{ errors[0] }}
    </div>
    {% endif %}

    <form method="post" action="{{ url_for('login') }}">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input value="{{ entered_email }}" name="user_email" required type="email"
               class="form-control" placeholder="your@email.com" autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label">Пароль</label>
        <input name="password" required minlength="8" type="password"
               class="form-control" placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2">Увійти</button>
    </form>

    <div class="auth-switch">
      Немає акаунту? <a href="{{ url_for('register') }}">Зареєструватись</a>
    </div>
  </div>
</div>
{% endblock %}
