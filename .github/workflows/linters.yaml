name: Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linters
        run: pip install black isort flake8

      - name: black
        run: black --check --line-length 120 --extend-exclude 'migrations' backend_api/app frontend/app notification_service/app

      - name: isort
        run: isort --check-only --profile black --line-length 120 --skip migrations backend_api/app frontend/app notification_service/app

      - name: flake8
        run: flake8 backend_api/app frontend/app notification_service/app
